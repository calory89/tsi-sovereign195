<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Startup Island</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0a0a; color: #fff; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .container { max-width: 800px; width: 90%; text-align: center; padding: 40px 20px; }
        .logo { font-size: 2.5rem; font-weight: 800; letter-spacing: -1px; margin-bottom: 1rem; }
        .logo span { color: #f90; }
        .tagline { font-size: 1.2rem; color: #999; margin-bottom: 2rem; }
        .cta { display: inline-block; background: #f90; color: #000; font-weight: 700; padding: 14px 32px; border-radius: 8px; text-decoration: none; font-size: 1rem; margin-top: 1rem; }
        .cta:hover { background: #ffb833; }
        footer { margin-top: 60px; color: #555; font-size: 0.85rem; }
        footer a { color: #777; text-decoration: none; margin: 0 10px; }
        footer a:hover { color: #f90; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">The <span>Startup</span> Island</div>
        <p class="tagline">Where founders come to build, grow, and launch.</p>
        <a href="#" class="cta">Get Early Access</a>
        <footer>
            <p>&copy; 2025 The Startup Island &mdash; All rights reserved</p>
            <p style="margin-top:10px;">
                <a href="/privacy.html">Privacy Policy</a>
                <a href="/cookies.html">Cookie Policy</a>
                <a href="/terms.html">Terms of Service</a>
            </p>
        </footer>
    </div>
</body>
</html>
